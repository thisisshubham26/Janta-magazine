<script>
  const API = "https://janta-mag.onrender.com/api" 
  const params = new URLSearchParams(window.location.search);
  const articleId = params.get("id"); 
  const token = localStorage.getItem("jm_token");

  if (!token) {
    alert("You must be logged in to edit articles.");
    window.location.href = "login.html";
  }

  // Decode JWT payload
  let payload;
  try {
    payload = JSON.parse(atob(token.split('.')[1]));
  } catch (err) {
    alert("Invalid login session. Please log in again.");
    window.location.href = "login.html";
  }

  // Load article details into form
  async function loadArticle() {
    try {
      const res = await fetch(`${API}/articles/${articleId}`, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      if (!res.ok) throw new Error("Failed to fetch article");
      const article = await res.json();

      // Optional: check ownership
      if (String(article.author?._id) !== String(payload.id)) {
        alert("You can only edit your own articles.");
        window.location.href = "dashboard.html";
        return;
      }

      document.getElementById("title").value = article.title || "";
      document.getElementById("content").value = article.content || "";
      document.getElementById("category").value = article.category || "";
    } catch (err) {
      console.error("Error loading article:", err);
      alert("Could not load article details.");
    }
  }

  // Handle form submission
  document.getElementById("editForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const category = document.getElementById("category").value.trim();

    try {
      const res = await fetch(`${API}/articles/${articleId}`, {
        method: "PUT",
        headers: { 
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ title, content, category })
      });

      if (res.ok) {
        alert("Article updated successfully!");
        window.location.href = "dashboard.html";
      } else {
        const errData = await res.json();
        alert("Failed to update article: " + (errData.error || res.statusText));
      }
    } catch (err) {
      console.error("Error updating article:", err);
      alert("Error connecting to server");
    }
  });

  // Load article when page opens
  loadArticle();
</script>
