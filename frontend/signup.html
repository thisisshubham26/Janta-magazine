      <input id="name" type="text" placeholder="Full name" required>

      <select id="role" required>

        <option value="reader">Reader</option>
        <option value="writer">Writer</option>
      </select>
      <input id="password" type="password" placeholder="Password" required minlength="8">
      <button type="submit">Create account</button>
    </form>
  </main>

<script>
  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const API ="https://janta-mag.onrender.com/api";

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const role = document.getElementById("role").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch(API + "/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password, role })
      });

      if (res.ok) {
        const data = await res.json(); // { token: "..." }
        const token = data.token;

        // Save JWT in localStorage
        localStorage.setItem("jm_token", token);

        // Decode JWT payload
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userName = payload.name;
        const userRole = payload.role;

        alert(`Registered successfully! Welcome ${userName}`);

        // Redirect based on role
        if (userRole === "writer") {
          window.location.href = "dashboard.html";
        } else {
          window.location.href = "index.html";
        }
      } else {
        let txt = '';
        try { txt = await res.text(); } catch(e){}
        console.error('Signup failed', res.status, txt);
        alert('Signup failed: ' + (txt || res.status));
      }
    } catch (err) {
      alert("Error connecting to server");
    }
  });
</script>


</body>
</html>
